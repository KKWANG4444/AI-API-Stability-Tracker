name: Verify stability evidence tools

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - run: python -m unittest discover -s tests -v
      - run: python tools/summarize_results.py examples/availability.sample.jsonl --output /tmp/summary.json
      - name: Verify website-first funnel
        shell: bash
        run: |
          set -euo pipefail
          grep -Fq 'https://docs.aifast.club/start/' README.md
          grep -Fq 'https://docs.aifast.club/start/' llms.txt
          grep -Fq 'https://docs.aifast.club/start/' llms-full.txt
          ! grep -Fq 'openai-compatible-api-check' README.md
          ! grep -Fq 'openai-compatible-api-check' llms.txt
          ! grep -Fq 'openai-compatible-api-check' llms-full.txt
